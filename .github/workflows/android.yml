name: Android Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    env:
      ANDROID_NDK_VERSION: 27.3.13750724
    name: Build Android package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi

      - name: Install cargo-apk
        run: cargo install cargo-apk

      - name: Install Android NDK
        run: |
          export ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" "ndk;${ANDROID_NDK_VERSION}"
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" "platforms;android-30"
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" "platforms;android-34"
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --licenses

      - name: Build Android APK
        run: |
          export ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          export ANDROID_NDK_VERSION="${ANDROID_NDK_VERSION}"
          ./scripts/package-android.sh

      - name: Upload Android apks
        uses: actions/upload-artifact@v4
        with:
          name: ale-my-eyes-android
          path: |
            ale-my-eyes-android/ale-my-eyes-arm64.apk
            ale-my-eyes-android/ale-my-eyes-armv7.apk
