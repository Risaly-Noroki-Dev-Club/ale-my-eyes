name: Android Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    name: Build Android package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android target
        run: rustup target add aarch64-linux-android

      - name: Install cargo-apk
        run: cargo install cargo-apk

      - name: Install Android NDK
        run: |
          ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" "ndk;25.2.9519653"
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" "platforms;android-30"
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --licenses

      - name: Build Android APK
        run: |
          ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          export ANDROID_NDK_ROOT="${ANDROID_HOME}/ndk/25.2.9519653"
          cargo apk build -p ale-gui --target aarch64-linux-android --lib --release
          APK_PATH=$(find target/aarch64-linux-android/release/apk -maxdepth 1 -name '*.apk' | head -n 1)
          test -n "${APK_PATH}"
          cp "${APK_PATH}" ale-my-eyes-android.apk

      - name: Upload Android apk
        uses: actions/upload-artifact@v4
        with:
          name: ale-my-eyes-android
          path: ale-my-eyes-android.apk
